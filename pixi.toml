[workspace]
authors = ["Udit Asopa <udit.asopa@gmail.com>"]
channels = ["conda-forge"]
name = "Reference Extractor from PDF Articles"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
parse = "python main.py"
help = "python main.py --help"
format = "isort main.py src && black main.py src"
lint = "ruff check main.py src && black --check main.py src && isort --check-only main.py src && mypy main.py src"

[dependencies]
pypdf = ">=6.7.3,<7"
typer = ">=0.24.0,<0.25"
ruff = ">=0.15.4,<0.16"
mypy = ">=1.19.1,<2"
isort = ">=8.0.0,<9"
black = ">=26.1.0,<27"
