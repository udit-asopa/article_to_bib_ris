[tool.black]
line-length = 88
target-version = ["py310"]
extend-exclude = "^(\\.pixi|\\.git)/"

[tool.isort]
profile = "black"
line_length = 88
skip = [".pixi", ".git"]
src_paths = ["src", "."]

[tool.ruff]
line-length = 88
exclude = [".pixi", ".git"]

[tool.mypy]
python_version = "3.10"
files = ["main.py", "src"]
exclude = "(^\\.pixi/|^\\.git/)"
ignore_missing_imports = true
